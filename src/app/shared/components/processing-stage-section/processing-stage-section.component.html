<div class="py-7 processing relative">
  <div class="container">
    <span class="section-tag">{{'processingStages.stage_tag'| translate}}</span>

    <div class="heading">
      <h2 class="mt-7 text-center section-title">{{'processingStages.title' | translate}}</h2>
      <p class="text-center mt-3">
        {{'processingStages.subtitle' | translate}}
      </p>
    </div>

    <div class="mt-5  hidden md:flex gap-5 justify-between" >
      <!-- Sidebar -->
      <div class="w-full md:w-1/4">
        <ul class="space-y-3 text-gray-700 font-medium">
            @for (stage of stages; track $index) {
            <li (click)="selectStage(stage)" [ngClass]="{
                'bg-[#f3e8ef] text-purple-900 font-semibold ': stage.id === selectedStage.id,
                'hover:bg-[#f3e8ef] bg-[#f3e8ef67] ': stage.id !== selectedStage.id
            }"
            class="px-4 py-3 rounded-lg transition cursor-pointer"
          >
            {{ stage.title }}
          </li>
            }
        
        </ul>
      </div>

      <!-- Main Content -->
      <div class="flex justify-center items-center content rounded-2xl flex-1 py-10 px-24">
        <div class="flex flex-col items-center justify-center text-center">
          <img
            [src]="selectedStage.pictureUrl"
            [alt]="selectedStage.title"
            class="rounded-xl w-full object-cover max-h-[400px] max-w-[600px]"
          />
          <p class="mt-4 text-gray-700 text-base ">
            {{ selectedStage.content }}
          </p>
        </div>
      </div>
    </div>
    <div class="mt-5 flex md:hidden overflow-x-auto space-x-4 snap-x snap-mandatory scroll-smooth px-5 py-3">
    @for (stage of stages; track $index) {
        <div class="px-6 py-4 text-center max-w-[300px] flex-shrink-0 content snap-center ">
        <h2 class="mb-4">{{ stage.title }}</h2>
        <img [src]="stage.pictureUrl" [alt]="stage.title" class="w-full h-[170px] object-contain mx-auto rounded-lg" />
        <label class="block mt-3 text-purple-700 font-semibold cursor-pointer">
        <input type="checkbox" />
        <p class="truncate-text text-gray-700 leading-relaxed">
          {{ stage.content }}
        </p>
                <span></span>

      </label>
        </div>
    }
    </div>

  </div>
</div>
