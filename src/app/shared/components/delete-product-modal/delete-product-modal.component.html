<div class="fixed inset-0 bg-black/60 z-[2000] flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md flex flex-col overflow-hidden">
    <!-- Header -->
    <div class="p-6 border-b flex justify-between items-center bg-[#1A1F2B] text-white">
      <h2 class="text-xl font-bold">{{ 'deleteProductModal.title' | translate }}</h2>
      <button (click)="close()" class="text-gray-300 hover:text-white transition-colors">
        <i class="fa-solid fa-xmark text-xl"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 text-center text-lg">
      <p>{{ 'deleteProductModal.confirmationMsg' | translate }}</p>
      <p class="font-bold mt-2">{{ productName }}</p>
    </div>

    <!-- Footer -->
    <div class="p-6 border-t bg-gray-50 flex items-center justify-end gap-4">
      @if (errorMsg) {
        <span class="text-red-500 text-sm font-medium mr-auto">{{ errorMsg }}</span>
      }
      <button (click)="close()" class="px-6 py-2 rounded-lg font-medium text-gray-700 bg-gray-200 hover:bg-gray-300 transition-colors">
        {{ 'deleteProductModal.cancel' | translate }}
      </button>
      <button (click)="confirmDelete()" [disabled]="isSubmitting" 
        class="px-6 py-2 rounded-lg font-medium text-white bg-red-500 hover:bg-red-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
        @if (isSubmitting) {
          <i class="fa-solid fa-spinner fa-spin"></i>
        }
        {{ 'deleteProductModal.confirm' | translate }}
      </button>
    </div>
  </div>
</div>
