<!-- Counters -->
    <div class="counters mt-7">
      @if (isLoading) {
      <div class="flex mx-auto gap-2 sm:gap-4 md:gap-6 lg:mx-0 lg:gap-4">
        <!-- Item 1 -->
        <div class="count text-center">
          <div class="h-8 sm:h-9 md:h-10 lg:h-12 w-16 sm:w-20 md:w-24 lg:w-28 bg-gray-300 rounded mx-auto"></div>
          <div class="h-4 w-24 sm:w-28 md:w-32 bg-gray-200 rounded mt-2 mx-auto"></div>
        </div>

        <!-- Item 2 -->
        <div class="count text-center">
          <div class="h-8 sm:h-9 md:h-10 lg:h-12 w-20 sm:w-24 md:w-28 lg:w-32 bg-gray-300 rounded mx-auto"></div>
          <div class="h-4 w-28 sm:w-32 md:w-36 bg-gray-200 rounded mt-2 mx-auto"></div>
        </div>

        <!-- Item 3 -->
        <div class="count text-center">
          <div class="h-8 sm:h-9 md:h-10 lg:h-12 w-12 sm:w-16 md:w-20 lg:w-24 bg-gray-300 rounded mx-auto"></div>
          <div class="h-4 w-28 sm:w-32 md:w-36 bg-gray-200 rounded mt-2 mx-auto"></div>
        </div>
      </div>
      }
      @else {
      <div
        class="flex mx-auto gap-2 sm:gap-4 md:gap-6 lg:mx-0 lg:gap-4"
      >
        <div class="count text-center">
          <h4 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl" appCounter [target]="counter" [duration]="1500">0</h4>
          <span class="text-base">{{'home.counter.yearsExperience' | translate}}</span>
        </div>
        <div class="count text-center">
          <h4 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl" appCounter [target]="100" [duration]="50">0</h4>
          <span class="text-base">{{'home.counter.customersGlobally' | translate}}</span>
        </div>
        <div class="count text-center">
          <h4 class="text-xl sm:text-2xl md:text-3xl lg:text-4xl" appCounter [target]="5" [duration]="1000">0</h4>
          <span class="text-base">{{'home.counter.branchesWorldwide' | translate}}</span>
        </div>
      </div>
      }
    </div>
