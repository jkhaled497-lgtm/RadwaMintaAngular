<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm px-4 py-4 transition-all duration-300">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] overflow-hidden flex flex-col transform transition-all">
    <!-- Header -->
    <div class="px-6 py-3 flex justify-between items-center bg-gradient-to-r from-[#4CE3A8] to-[#12b981] text-white">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-md">
          <i class="fa-solid fa-bullhorn text-sm"></i>
        </div>
        <div>
          <h2 class="text-lg font-bold tracking-wide">{{ 'addNewsModal.title' | translate }}</h2>
        </div>
      </div>
      <button (click)="close()" class="w-7 h-7 flex items-center justify-center rounded-full text-white hover:bg-white/20 transition-colors">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-4 md:p-5 overflow-y-auto bg-gray-50/50">
      @if (errorMsg) {
        <div class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 rounded-r-lg flex items-center gap-3 shadow-sm">
          <i class="fa-solid fa-circle-exclamation text-red-500 text-base"></i>
          <span class="text-red-800 font-medium text-sm">{{ errorMsg }}</span>
        </div>
      }

      <form [formGroup]="newsForm" (ngSubmit)="submit()" class="space-y-4">
        
        <!-- Grid: English left, Arabic right -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-6">
          
          <!-- English Column -->
          <div class="space-y-3 bg-white p-4 md:p-5 rounded-xl border border-gray-100 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
            <div class="flex items-center gap-2 mb-3 border-b border-gray-50 pb-2">
              <span class="text-lg">🇬🇧</span>
              <h3 class="font-bold text-gray-800 tracking-wide uppercase text-sm">{{ 'addNewsModal.englishDetails' | translate }}</h3>
            </div>
            
            <div class="space-y-3">
              <!-- Name (En) -->
              <div>
                <label class="block text-[11px] font-bold text-gray-600 uppercase tracking-wider mb-1">{{ 'addNewsModal.name' | translate }} <span class="text-red-500">*</span></label>
                <div class="relative">
                  <input formControlName="name" type="text" [placeholder]="'addNewsModal.namePlaceholder' | translate" 
                         [class]="'w-full bg-gray-50 border rounded-lg px-3 py-2 outline-none focus:bg-white transition-all duration-300 placeholder:text-gray-400 text-sm ' + ((newsForm.get('name')?.invalid && newsForm.get('name')?.touched) ? 'border-red-400 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-gray-200 focus:border-[#4CE3A8] focus:ring-4 focus:ring-[#4CE3A8]/10')">
                </div>
              </div>
              
              <!-- About (En) -->
              <div>
                <label class="block text-[11px] font-bold text-gray-600 uppercase tracking-wider mb-1">{{ 'addNewsModal.about' | translate }} <span class="text-red-500">*</span></label>
                <div class="relative">
                  <input formControlName="about" type="text" [placeholder]="'addNewsModal.aboutPlaceholder' | translate" 
                         [class]="'w-full bg-gray-50 border rounded-lg px-3 py-2 outline-none focus:bg-white transition-all duration-300 placeholder:text-gray-400 text-sm ' + ((newsForm.get('about')?.invalid && newsForm.get('about')?.touched) ? 'border-red-400 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-gray-200 focus:border-[#4CE3A8] focus:ring-4 focus:ring-[#4CE3A8]/10')">
                </div>
              </div>

              <!-- Description (En) -->
              <div>
                <label class="block text-[11px] font-bold text-gray-600 uppercase tracking-wider mb-1">{{ 'addNewsModal.description' | translate }} <span class="text-red-500">*</span></label>
                <div class="relative">
                  <textarea formControlName="description" rows="2" [placeholder]="'addNewsModal.descriptionPlaceholder' | translate" 
                            [class]="'w-full bg-gray-50 border rounded-lg px-3 py-2 outline-none focus:bg-white transition-all duration-300 placeholder:text-gray-400 text-sm resize-none ' + ((newsForm.get('description')?.invalid && newsForm.get('description')?.touched) ? 'border-red-400 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-gray-200 focus:border-[#4CE3A8] focus:ring-4 focus:ring-[#4CE3A8]/10')"></textarea>
                </div>
              </div>
            </div>
          </div>

          <!-- Arabic Column -->
          <div class="space-y-3 bg-white p-4 md:p-5 rounded-xl border border-gray-100 shadow-sm relative overflow-hidden" dir="rtl">
            <div class="absolute top-0 right-0 w-1 h-full bg-green-500"></div>
            <div class="flex items-center gap-2 mb-3 border-b border-gray-50 pb-2">
              <span class="text-lg">🇸🇦</span>
              <h3 class="font-bold text-gray-800 tracking-wide uppercase text-sm">{{ 'addNewsModal.arabicDetails' | translate }}</h3>
            </div>
            
            <div class="space-y-3">
              <!-- Name (Ar) -->
              <div>
                <label class="block text-[11px] font-bold text-gray-600 uppercase tracking-wider mb-1">{{ 'addNewsModal.nameAr' | translate }} <span class="text-red-500">*</span></label>
                <div class="relative">
                  <input formControlName="nameAr" type="text" [placeholder]="'addNewsModal.nameArPlaceholder' | translate" 
                         [class]="'w-full bg-gray-50 border rounded-lg px-3 py-2 outline-none focus:bg-white transition-all duration-300 placeholder:text-gray-400 text-sm ' + ((newsForm.get('nameAr')?.invalid && newsForm.get('nameAr')?.touched) ? 'border-red-400 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-gray-200 focus:border-[#4CE3A8] focus:ring-4 focus:ring-[#4CE3A8]/10')">
                </div>
              </div>
              
              <!-- About (Ar) -->
              <div>
                <label class="block text-[11px] font-bold text-gray-600 uppercase tracking-wider mb-1">{{ 'addNewsModal.aboutAr' | translate }} <span class="text-red-500">*</span></label>
                <div class="relative">
                  <input formControlName="aboutAr" type="text" [placeholder]="'addNewsModal.aboutArPlaceholder' | translate" 
                         [class]="'w-full bg-gray-50 border rounded-lg px-3 py-2 outline-none focus:bg-white transition-all duration-300 placeholder:text-gray-400 text-sm ' + ((newsForm.get('aboutAr')?.invalid && newsForm.get('aboutAr')?.touched) ? 'border-red-400 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-gray-200 focus:border-[#4CE3A8] focus:ring-4 focus:ring-[#4CE3A8]/10')">
                </div>
              </div>

              <!-- Description (Ar) -->
              <div>
                <label class="block text-[11px] font-bold text-gray-600 uppercase tracking-wider mb-1">{{ 'addNewsModal.descriptionAr' | translate }} <span class="text-red-500">*</span></label>
                <div class="relative">
                  <textarea formControlName="descriptionAr" rows="2" [placeholder]="'addNewsModal.descriptionArPlaceholder' | translate" 
                            [class]="'w-full bg-gray-50 border rounded-lg px-3 py-2 outline-none focus:bg-white transition-all duration-300 placeholder:text-gray-400 text-sm resize-none ' + ((newsForm.get('descriptionAr')?.invalid && newsForm.get('descriptionAr')?.touched) ? 'border-red-400 focus:border-red-500 focus:ring-4 focus:ring-red-500/20' : 'border-gray-200 focus:border-[#4CE3A8] focus:ring-4 focus:ring-[#4CE3A8]/10')"></textarea>
                </div>
              </div>
            </div>
          </div>
          
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="px-6 py-3 border-t border-gray-100 flex items-center justify-end gap-3 bg-white">
      <button (click)="close()" type="button" class="px-5 py-2 rounded-xl text-gray-500 text-sm font-semibold hover:bg-gray-100 hover:text-gray-700 transition-all duration-200">
        {{ 'addNewsModal.cancel' | translate }}
      </button>
      <button (click)="submit()" type="button" [disabled]="isSubmitting || newsForm.invalid" 
              class="px-6 py-2 bg-gradient-to-r from-[#4CE3A8] to-[#12b981] text-white text-sm font-bold rounded-xl shadow-lg shadow-[#4CE3A8]/30 hover:shadow-[#4CE3A8]/50 hover:-translate-y-0.5 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-none flex items-center gap-2">
        @if (isSubmitting) {
          <i class="fa-solid fa-circle-notch fa-spin"></i>
          <span>{{ 'addNewsModal.saving' | translate }}</span>
        } @else {
          <i class="fa-regular fa-paper-plane"></i>
          <span>{{ 'addNewsModal.saveTicker' | translate }}</span>
        }
      </button>
    </div>
  </div>
</div>
